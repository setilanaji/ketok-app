name: PR Describe (OpenCode)

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  describe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff and commit log
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=1 || true
          git diff "origin/$BASE_REF...HEAD" | head -c 100000 > pr-diff.txt
          git log "origin/$BASE_REF...HEAD" --pretty=format:"%h %s%n%b" > commits.txt

      - name: Run OpenCode describe
        env:
          OPENCODE_PROVIDER: ${{ vars.OPENCODE_PROVIDER }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL }}
        run: |
          case "$OPENCODE_PROVIDER" in
            anthropic) KEY_VAR="ANTHROPIC_API_KEY" ;;
            openai)    KEY_VAR="OPENAI_API_KEY" ;;
            google)    KEY_VAR="GOOGLE_GENERATIVE_AI_API_KEY" ;;
            *) echo "Unknown provider: $OPENCODE_PROVIDER"; exit 1 ;;
          esac

          MOUNT_ARGS=""
          if [ -d ".opencode" ]; then
            MOUNT_ARGS="-v $PWD/.opencode:/reviewer/.opencode:ro"
          fi

          IMAGE="${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/opencode-reviewer:latest"

          docker pull "$IMAGE" >/dev/null 2>&1 || true

          docker run --rm \
            -e "${KEY_VAR}=${OPENCODE_API_KEY}" \
            -e "OPENCODE_MODEL=${OPENCODE_MODEL}" \
            -e "MODE=describe" \
            -v "$PWD/pr-diff.txt:/workspace/pr-diff.txt:ro" \
            -v "$PWD/commits.txt:/workspace/commits.txt:ro" \
            $MOUNT_ARGS \
            "$IMAGE" \
            > describe-output.txt 2> describe-stderr.log || true

          echo "----- describe-output.txt (first 4000 chars) -----"
          head -c 4000 describe-output.txt || true
          echo
          echo "----- describe-stderr.log (first 2000 chars) -----"
          head -c 2000 describe-stderr.log || true
          echo

      - name: Update PR body
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('describe-output.txt', 'utf8').trim();

            let parsed = null;
            const stripped = raw.replace(/```(?:json)?\s*/gi, '').replace(/```/g, '');
            const start = stripped.indexOf('{');
            const end = stripped.lastIndexOf('}');
            const candidate = start !== -1 && end > start ? stripped.slice(start, end + 1) : stripped;
            try { parsed = JSON.parse(candidate); } catch (e) {}

            if (!parsed) {
              console.log('Could not parse LLM output — skipping PR body update.');
              console.log(raw.slice(0, 2000));
              return;
            }

            const changes = (parsed.changes || []).map(c => `- ${c}`).join('\n') || '_No changes listed._';
            const breaking = (parsed.breaking_changes || []).length
              ? parsed.breaking_changes.map(c => `- ${c}`).join('\n')
              : '_None_';

            const body = [
              '## Summary',
              '',
              parsed.summary || '',
              '',
              '## Changes',
              '',
              changes,
              '',
              '## Breaking Changes',
              '',
              breaking,
              '',
              '## Testing',
              '',
              parsed.testing_notes || '_No testing notes._',
              '',
              '---',
              '_Generated by OpenCode AI — edit freely._',
            ].join('\n');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body,
            });
