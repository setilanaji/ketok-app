name: PR Review (OpenCode)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff and file list
        id: diff
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=1 || true
          git diff "origin/$BASE_REF...HEAD" | head -c 100000 > pr-diff.txt
          git diff --name-only "origin/$BASE_REF...HEAD" > changed-files.txt

      - name: Run OpenCode review
        env:
          OPENCODE_PROVIDER: ${{ vars.OPENCODE_PROVIDER }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL }}
        run: |
          # Map provider name to the env var opencode expects
          case "$OPENCODE_PROVIDER" in
            anthropic) KEY_VAR="ANTHROPIC_API_KEY" ;;
            openai)    KEY_VAR="OPENAI_API_KEY" ;;
            google)    KEY_VAR="GOOGLE_GENERATIVE_AI_API_KEY" ;;
            *) echo "Unknown provider: $OPENCODE_PROVIDER"; exit 1 ;;
          esac

          # Use repo-local .opencode/ if present, otherwise image defaults are used
          MOUNT_ARGS=""
          if [ -d ".opencode" ]; then
            MOUNT_ARGS="-v $PWD/.opencode:/reviewer/.opencode:ro"
          fi

          docker run --rm \
            -e "${KEY_VAR}=${OPENCODE_API_KEY}" \
            -e "OPENCODE_MODEL=${OPENCODE_MODEL}" \
            -v "$PWD/pr-diff.txt:/workspace/pr-diff.txt:ro" \
            -v "$PWD/changed-files.txt:/workspace/changed-files.txt:ro" \
            $MOUNT_ARGS \
            ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/opencode-reviewer:latest \
            > review-output.txt 2>&1 || true

      - name: Post review to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('review-output.txt', 'utf8').trim();

            let parsed = null;
            const match = raw.match(/\{[\s\S]*\}$/);
            try { parsed = JSON.parse(match ? match[0] : raw); } catch (e) {}

            if (!parsed) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: "### OpenCode Review (raw)\n\n```\n" + raw.slice(0, 60000) + "\n```",
              });
              return;
            }

            const verdictMap = {
              approve: 'COMMENT',
              request_changes: 'REQUEST_CHANGES',
              comment: 'COMMENT',
            };
            const event = verdictMap[parsed.verdict] || 'COMMENT';

            const issues = parsed.issues || [];
            let table = '_No issues found._';
            if (issues.length) {
              table = '| Severity | File | Line | Category | Message | Suggestion |\n' +
                      '|---|---|---|---|---|---|\n' +
                      issues.map(i =>
                        `| ${i.severity || ''} | \`${i.file || ''}\` | ${i.line || ''} | ${i.category || ''} | ${(i.message||'').replace(/\|/g,'\\|')} | ${(i.suggestion||'').replace(/\|/g,'\\|')} |`
                      ).join('\n');
            }

            const body = `### OpenCode Review\n\n**Summary:** ${parsed.summary || '(none)'}\n\n**Verdict:** \`${parsed.verdict}\`\n\n${table}`;

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event,
              body,
            });
